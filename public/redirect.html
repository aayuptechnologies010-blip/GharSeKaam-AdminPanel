<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Redirecting to GharSeKro.com Admin...</h2>
        <p>Please wait while we redirect you to the application.</p>
    </div>

    <script>
        // Get the current URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        
        // Extract OAuth parameters
        const token = urlParams.get('token');
        const name = urlParams.get('name');
        const email = urlParams.get('email');
        const profile = urlParams.get('profile');
        const success = urlParams.get('success');
        
        console.log('OAuth Redirect received:', { token: !!token, name, email, profile, success });
        
        if (token) {
            // Construct the redirect URL to your local application
            const redirectUrl = new URL('http://localhost:8081/auth');
            redirectUrl.searchParams.set('token', token);
            if (name) redirectUrl.searchParams.set('name', name);
            if (email) redirectUrl.searchParams.set('email', email);
            if (profile) redirectUrl.searchParams.set('profile', profile);
            if (success) redirectUrl.searchParams.set('success', success);
            
            console.log('Redirecting to:', redirectUrl.toString());
            
            // Redirect to your application
            window.location.href = redirectUrl.toString();
        } else {
            console.error('No token found in OAuth callback');
            // Fallback redirect to auth page
            window.location.href = 'http://localhost:8081/auth';
        }
    </script>
</body>
</html>
